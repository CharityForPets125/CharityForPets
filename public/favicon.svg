<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Heart shape with paw -->
  <defs>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a4c639;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a8c2f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Heart background -->
  <path d="M100,170 C30,130 10,100 10,75 C10,50 30,35 50,35 C65,35 80,45 100,60 C120,45 135,35 150,35 C170,35 190,50 190,75 C190,100 170,130 100,170 Z" fill="url(#heartGradient)"/>
  
  <!-- Paw pad - center -->
  <ellipse cx="100" cy="85" rx="18" ry="22" fill="white"/>
  
  <!-- Paw pad - top left -->
  <ellipse cx="70" cy="55" rx="13" ry="18" fill="white"/>
  
  <!-- Paw pad - top center -->
  <ellipse cx="100" cy="45" rx="13" ry="18" fill="white"/>
  
  <!-- Paw pad - top right -->
  <ellipse cx="130" cy="55" rx="13" ry="18" fill="white"/>
  
  <!-- Paw pad - right -->
  <ellipse cx="150" cy="80" rx="13" ry="18" fill="white"/>
  
  <!-- Arrow pointer -->
  <path d="M35,130 L50,110 L45,115 L55,105" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Small paw prints decoration -->
  <g opacity="0.6">
    <ellipse cx="25" cy="155" rx="4" ry="6" fill="white"/>
    <ellipse cx="35" cy="165" rx="4" ry="6" fill="white"/>
    <ellipse cx="45" cy="175" rx="4" ry="6" fill="white"/>
  </g>
</svg>